<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Статус группы</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
    margin:0;
    display:flex;
    justify-content:center;
    padding-top:40px;
}

.container{
    width:420px;
}

.card{
    background:white;
    border-radius:10px;
    padding:20px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
    margin-top:0;
}

.buttons{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:15px;
}

button{
    border:none;
    padding:12px;
    border-radius:6px;
    font-size:14px;
    cursor:pointer;
}

.study{ background:#28a745; color:white;}
.coffee{ background:#ffc107;}
.game{ background:#17a2b8; color:white;}
.home{ background:#6c757d; color:white;}

.user-item{
    display:flex;
    align-items:center;
    margin-bottom:12px;
}

.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    margin-right:10px;
}

.flex-grow{
    flex-grow:1;
}
</style>

</head>

<body>

<div class="container">

<div class="card">
<h2>Мой профиль</h2>

<div id="myInfo">Загрузка...</div>

<div class="buttons">
<button class="study" onclick="changeStatus('Учусь','#28a745')">📚 Учусь</button>
<button class="coffee" onclick="changeStatus('Кофе-брейк','#ffc107')">☕ Кофе</button>
<button class="game" onclick="changeStatus('В игре','#17a2b8')">🎮 В игре</button>
<button class="home" onclick="changeStatus('Дома','#6c757d')">🏠 Дома</button>
</div>
</div>

<div class="card">
<h2>Монитор группы</h2>
<div id="grouplist"></div>
</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const URL = 'https://ymgsmxwgsqmizwccljfn.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltZ3NteHdnc3FtaXp3Y2NsamZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NjE2NDAsImV4cCI6MjA4ODMzNzY0MH0.XgwYTFqTmWx9vIwbim2BUT1sdtWA2SIGuySOuZ2-TKM';

const supabase = createClient(URL, KEY);

const MY_ID = 'bb71dae8-cc67-4b9c-a364-e980f189fe27';

window.changeStatus = async (text, color) => {

const { error } = await supabase
.from('profiles')
.update({ status: text, color: color })
.eq('id', MY_ID);

if (error) {
alert("Ошибка! Проверьте RLS политики в Supabase.");
console.error(error);
} else {
fetchGroup();
}

};

async function fetchGroup() {

const { data, error } = await supabase
.from('profiles')
.select('*')
.order('username', { ascending: true });

if (error) return console.error(error);

const list = document.getElementById("grouplist");

list.innerHTML = data.map(user => `
<div class="user-item">
<div class="status-dot" style="background:${user.color || '#ccc'}"></div>

<div class="flex-grow">
<strong>${user.username}</strong><br>
<small style="color:#666;">${user.status || 'Статус не задан'}</small>
</div>

</div>
`).join("");

const me = data.find(u => u.id === MY_ID);

if (me) {
document.getElementById("myInfo").innerText = `Вы зашли как: ${me.username}`;
}

}

fetchGroup();

setInterval(fetchGroup, 5000);

</script>

</body>
</html>
