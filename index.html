<!DOCTYPE html>
<html>
<head>
    <title>Монитор статусов</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        .user { margin: 10px 0; padding: 10px; border: 1px solid #ccc; }
        .online { color: green; font-weight: bold; }
        .offline { color: gray; }
        button { margin-left: 10px; }
    </style>
</head>
<body>
    <h1>Статусы пользователей</h1>
    <div id="users-list"></div>

    <script>
        // ⚠️ ПОДСТАВЬТЕ СВОИ ДАННЫЕ ⚠️
        const SUPABASE_URL = 'https://swmxtnnheeumvlizwcxw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3bXh0bm5oZWV1bXZsaXp3Y3h3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNDQ3NjcsImV4cCI6MjA5MTkyMDc2N30.78c6ZLZnfgfLlC2jAUaNlvXPbXQ2mq5dpmI9o-91uKw';
        const MY_USER_ID = 'ead24684-6dac-424a-9270-7b93aa019271';

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Загрузка всех пользователей
        async function loadUsers() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*');
            
            if (error) {
                console.error('Ошибка:', error);
                return;
            }
            
            const container = document.getElementById('users-list');
            container.innerHTML = '';
            
            data.forEach(user => {
                const div = document.createElement('div');
                div.className = 'user';
                div.innerHTML = `
                    <strong>${user.username}</strong>
                    <span class="${user.status === 'online' ? 'online' : 'offline'}">
                        (${user.status || 'неизвестно'})
                    </span>
                    ${user.id === MY_USER_ID ? `
                        <button onclick="setStatus('online')">🟢 Online</button>
                        <button onclick="setStatus('offline')">⚫ Offline</button>
                        <button onclick="setStatus('busy')">🔴 Busy</button>
                    ` : ''}
                `;
                container.appendChild(div);
            });
        }

        // Обновление своего статуса
        async function setStatus(newStatus) {
            const { error } = await supabase
                .from('profiles')
                .update({ status: newStatus })
                .eq('id', MY_USER_ID);
            
            if (error) {
                console.error('Ошибка обновления:', error);
            } else {
                loadUsers(); // перезагружаем список
            }
        }

        // Включение реального времени (Realtime)
        const channel = supabase
            .channel('profiles-changes')
            .on('postgres_changes', 
                { event: '*', schema: 'public', table: 'profiles' },
                () => loadUsers()
            )
            .subscribe();

        // Загрузка при старте
        loadUsers();
    </script>
</body>
</html>
